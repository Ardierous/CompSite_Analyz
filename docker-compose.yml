# 袩褉芯写邪泻褕械薪: 锌褉懈谢芯卸械薪懈械 + Caddy (HTTPS Let鈥檚 Encrypt, HTTP鈫扝TTPS, www鈫抋pex).
# 袟邪锌褍褋泻 懈蟹 泻芯褉薪褟 褉械锌芯蟹懈褌芯褉懈褟: docker compose pull && docker compose up -d
# 小屑. HTTPS.md

networks:
  web:
    driver: bridge

services:
  app:
    image: avardous/comp_site_analyz:latest
    container_name: comp-site-app
    networks:
      - web
    expose:
      - "5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    restart: unless-stopped
    ipc: host

  caddy:
    image: caddy:2-alpine
    container_name: comp-site-caddy
    networks:
      - web
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
